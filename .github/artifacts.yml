# Artifacts Configuration for wallet-dss-cli
# Defines what to build and where to publish

artifacts:
  - name: wallet-dss-cli
    project-type: maven
    working-directory: .
    build-type: application
    config:
      java-version: 25

containers:
  - name: wallet-dss-cli
    from: [wallet-dss-cli]
    container-file: Containerfile
    context: .
    platforms: linux/amd64,linux/arm64
    registry: ghcr.io

publishers:
  - type: github-packages
    artifacts: [wallet-dss-cli]
